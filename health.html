<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Статус сервиса · jonnify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0a0e1a; --surface:#131826; --surface-2:#1a2138; --line:#2a3252;
  --cream:#ece4d0; --cream-soft:#d9cfb4; --muted:#a89a7a; --muted-2:#7d745f;
  --gold:#d4a85a; --sage:#7ba387; --sage-bright:#9bc1a4;
  --serif:'Cormorant Garamond',Georgia,serif; --sans:'Manrope',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace; --rad:4px; --rad-lg:10px;
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:28px;
  background:radial-gradient(1200px 600px at 50% -10%,var(--surface-2),var(--ink));
  color:var(--cream);font-family:var(--sans);line-height:1.6}
.card{width:100%;max-width:460px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--rad-lg);padding:34px 32px;box-shadow:0 24px 60px -28px rgba(0,0,0,.7)}
.brand{font-family:var(--mono);font-size:.74rem;letter-spacing:.22em;text-transform:uppercase;
  color:var(--muted-2);margin-bottom:22px}
.status{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.dot{width:12px;height:12px;border-radius:50%;background:var(--sage-bright);
  box-shadow:0 0 0 4px rgba(123,163,135,.18);animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(123,163,135,.18)}50%{box-shadow:0 0 0 8px rgba(123,163,135,.04)}}
@media (prefers-reduced-motion:reduce){.dot{animation:none}}
h1{font-family:var(--serif);font-weight:600;font-size:1.9rem;margin:0;color:var(--cream)}
.sub{color:var(--cream-soft);margin:10px 0 24px;font-size:.98rem}
.row{display:flex;justify-content:space-between;gap:14px;padding:11px 0;border-top:1px solid var(--line);
  font-size:.9rem}
.row .k{color:var(--muted)}
.row .v{font-family:var(--mono);color:var(--cream-soft)}
.row .v a{color:var(--gold);text-decoration:none;border-bottom:1px solid transparent}
.row .v a:hover{border-bottom-color:var(--gold)}
.foot{margin-top:24px;font-size:.84rem;color:var(--muted-2)}
.foot a{color:var(--muted);text-decoration:none}
.foot a:hover{color:var(--cream)}
</style>
</head>
<body>
<main class="card">
  <div class="brand">jonnify · service status</div>
  <div class="status"><span class="dot" aria-hidden="true"></span><h1>Operational</h1></div>
  <p class="sub">Веб‑слой обслуживает запросы. Эта страница статична: если вы её видите — сервер отвечает.</p>
  <div class="row"><span class="k">Liveness probe (JSON)</span><span class="v"><a href="/healthz">/healthz</a></span></div>
  <div class="row"><span class="k">Site map</span><span class="v"><a href="/sitemap.xml">/sitemap.xml</a></span></div>
  <p class="foot"><a href="/">← На главную</a></p>
</main>
</body>
</html>
