# fly.toml - jonnify distribution server
# Serves static .tar.gz files (litestream, flyer)
app = 'jonnify'
primary_region = 'fra'

[build]
  dockerfile = "Dockerfile"

# Deploy Configuration
[deploy]
  strategy = "rolling"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

kill_signal = "SIGTERM"
kill_timeout = 10

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
