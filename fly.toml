# fly.toml - jonnify go edge
# ═══════════════════════════════════════════════════════════════════════════════
app = 'jonnify'
primary_region = 'fra'

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

# CRITICAL: Settings optimized for persistent WebSocket/SSE connections
[http_service]
  internal_port = 8080
  force_https = true
  # CRITICAL: Don't kill machines with active connections
  auto_stop_machines = 'off'
  auto_start_machines = true
  # Keep at least 2 machines for redundancy during rolling deploys
  min_machines_running = 2
  processes = ['app']

  # Connection-based concurrency (not request-based)
  [http_service.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 250

  # Extended idle timeout for long-lived connections
  # Adjust based on ping interval (25s) - 10 minutes provides safety margin
  [http_service.http_options]
    idle_timeout = 600

# Health check on separate endpoint (not WebSocket path)
[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

# Standard ports
[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

# Graceful shutdown: 30 seconds for connection draining
kill_signal = "SIGTERM"
kill_timeout = 30

# Volume mount for .gar.gz files
#[[mounts]]
#  source = "jonnify_data"
#  destination = "/data"

# Minimal VM
[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
