;; Codemojex — PgBouncer in front of the co-located PostgreSQL (same machine).
;; Transaction pooling: a server connection is held only for the length of a
;; transaction, so a handful of backend connections fan out to many clients.
;; PgBouncer talks to Postgres over loopback; clients reach 6432 (TLS).

[databases]
;; The backend is on this machine's loopback — no network hop, no server TLS.
codemojex = host=127.0.0.1 port=5432 dbname=codemojex

[pgbouncer]
listen_addr = *
listen_port = 6432
unix_socket_dir = /var/run/postgresql

;; ---- Pooling -------------------------------------------------------------
pool_mode = transaction
max_client_conn = 20            ;; the external ceiling: no more than 20 client connections
default_pool_size = 20          ;; serve all 20 without queueing
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
;; Keep total backend connections below Postgres max_connections (100), leaving
;; room for migrations, a psql, monitoring, and a future replica.
max_db_connections = 80

;; Protocol-level prepared statements in transaction mode (PgBouncer >= 1.21).
;; Non-zero is what lets Ecto/Postgrex keep its named prepared statements here.
max_prepared_statements = 200

;; Ecto/Postgrex sends these on connect; accept and ignore rather than reject.
ignore_startup_parameters = extra_float_digits,search_path

;; ---- Authentication ------------------------------------------------------
;; Clients present their own SCRAM password; PgBouncer fetches the stored
;; verifier from Postgres via a SECURITY DEFINER lookup, run as the low-privilege
;; "pgbouncer" role. That role's own password lives in userlist.txt (plaintext,
;; so PgBouncer can SCRAM-authenticate it to the backend).
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
auth_user = pgbouncer
auth_dbname = codemojex
auth_query = SELECT uname, phash FROM pgbouncer.user_lookup($1)

;; ---- Client TLS (the external laptop hop) --------------------------------
;; Connections must arrive over TLS; the self-signed cert is generated at boot.
;; The laptop connects with sslmode=require.
client_tls_sslmode = require
client_tls_cert_file = /etc/pgbouncer/server.crt
client_tls_key_file = /etc/pgbouncer/server.key
;; Loopback to Postgres needs no TLS.
server_tls_sslmode = disable

;; ---- Admin / observability ----------------------------------------------
admin_users = postgres
stats_users = postgres
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
