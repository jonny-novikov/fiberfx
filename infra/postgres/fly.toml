# PostgreSQL node on Fly.
#
# Private by construction: no [http_service], no [[services]], so Fly Proxy
# assigns no public address. Create the app without a public IP and the Phoenix
# app reaches it over the org's private 6PN at echo-postgres.internal:5432.
#
#   fly apps create echo-postgres            # no public IP by default
#   fly volumes create pg_data --size 5 --region fra -a echo-postgres
#   fly secrets set -a echo-postgres \
#     POSTGRES_PASSWORD="$(openssl rand -hex 32)" \
#     POSTGRES_ECHO_USER=echo_mesh POSTGRES_ECHO_PASSWORD="$(openssl rand -hex 32)"
#   # POSTGRES_DB=codemojex is non-secret — set in [env] below, not here.
#   fly deploy -a echo-postgres
#
# This is unmanaged Postgres. Fly takes daily volume snapshots kept for five days
# — a floor, not a backup strategy. Add off-site PITR and a replica before launch.

app = "echo-postgres"
primary_region = "fra"

# Postgres fast shutdown (SIGINT) checkpoints and exits cleanly; give it room.
kill_signal = "SIGINT"
kill_timeout = "60s"

# The application database name is non-secret, so it lives here, not in secrets.
# This guarantees POSTGRES_DB is set on every first-boot init — so the `codemojex`
# database is always created. (The image honours POSTGRES_DB only at first initdb.)
[env]
  POSTGRES_DB = "codemojex"

[build]
  dockerfile = "Dockerfile"

# One volume, one machine: a Fly volume lives on a single NVMe host in a single
# region and is not network storage. Size it for the WAL plus the growing
# guesses and transactions tables; volumes grow, never shrink.
[[mounts]]
  source = "pg_data"
  destination = "/var/lib/postgresql/data"

[[vm]]
  size = "shared-cpu-2x"
  cpu_kind = "shared"
  cpus = 2
  memory = "2gb"

# TCP liveness on the private port. A bare connect suffices.
[checks]
  [checks.alive]
    type = "tcp"
    port = 5432
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"
