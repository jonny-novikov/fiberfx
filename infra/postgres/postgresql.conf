###############################################################################
# PostgreSQL on Fly shared-cpu-2x / 2 GB
#
# The system of record for money: balances and the transaction ledger. The hot
# path is a short OLTP write transaction per guess (SELECT ... FOR UPDATE on the
# player row, a HOT UPDATE of the balance, an INSERT into the append-only ledger).
# Tuned for that, for the NVMe volume, and for durability that never loses a
# committed payout. The password and any per-deploy secrets are injected by the
# image entrypoint from environment (Fly secrets), never written here.
#
# Started with:  postgres -c config_file=/etc/postgresql/postgresql.conf
###############################################################################

# ---- Where the cluster lives -------------------------------------------------
# A subdirectory of the Fly volume mount so initdb does not trip on lost+found.
data_directory = '/var/lib/postgresql/data/pgdata'

# ---- Connections -------------------------------------------------------------
# No public service on Fly; the wildcard listens only on the private 6PN.
listen_addresses = '*'
port = 5432
max_connections = 100               # headroom; the real cap is the client pool
superuser_reserved_connections = 3
password_encryption = scram-sha-256

# A stuck idle-in-transaction session pins the xmin horizon and stalls vacuum;
# bound it so a leaked connection cannot let dead tuples pile up unbounded.
idle_in_transaction_session_timeout = '60s'

# ---- Memory ------------------------------------------------------------------
shared_buffers = 512MB              # 25% of 2 GB (the dedicated-server guideline)
effective_cache_size = 1536MB       # a planner hint (OS + PG cache), not an allocation
work_mem = 8MB                      # per operation per connection — kept low on purpose
maintenance_work_mem = 256MB        # VACUUM, CREATE INDEX
autovacuum_work_mem = 128MB         # a vacuum worker's own bound, below maintenance_work_mem
huge_pages = try                    # marginal at this shared_buffers size; harmless

# ---- Durability: a committed payout must survive a crash ---------------------
# Do not relax these for a money database. synchronous_commit on means commit
# waits for the WAL flush, so a transaction reported committed is preserved even
# if the server crashes immediately after. fsync off would risk corruption.
fsync = on
synchronous_commit = on
full_page_writes = on

# ---- Write-ahead log & checkpoints -------------------------------------------
wal_level = replica                 # enough for a streaming replica and a base backup
wal_compression = on                # less WAL volume on a small volume, small CPU cost
wal_buffers = 16MB
min_wal_size = 256MB
max_wal_size = 2GB                  # fewer checkpoints (fewer full-page-write storms);
                                    # the cost is more disk and a longer crash recovery
checkpoint_timeout = '15min'
checkpoint_completion_target = 0.9  # smear checkpoint I/O across the interval

# Off-site WAL archiving for point-in-time recovery is wired separately (WAL-G or
# pgBackRest to Tigris). Leave archive_mode off until that target works: enabling
# it without a working archive_command lets pg_wal fill the volume.
archive_mode = off

# ---- Autovacuum: the hot players row churns dead tuples ----------------------
# The per-guess balance UPDATE leaves a dead tuple each time. Defaults wait for
# 20% of a table to die before vacuuming; trigger far earlier and let vacuum keep
# up. The append-only ledger and guesses tables also need insert-driven vacuum to
# set the visibility map and freeze rows ahead of wraparound.
autovacuum = on
autovacuum_naptime = '10s'
autovacuum_vacuum_scale_factor = 0.05
autovacuum_vacuum_insert_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_delay = '2ms'
autovacuum_vacuum_cost_limit = 1000
autovacuum_max_workers = 3
# Per-table tightening (in a migration, not here):
#   ALTER TABLE players SET (fillfactor = 90, autovacuum_vacuum_scale_factor = 0.02);
#   ALTER TABLE guesses SET (autovacuum_vacuum_insert_scale_factor = 0.02);

# ---- Planner & I/O for the NVMe volume ---------------------------------------
random_page_cost = 1.1              # NVMe random reads are cheap (default 4.0 is for spinning disk)
effective_io_concurrency = 200
maintenance_io_concurrency = 200
default_statistics_target = 100

# Short point-lookup OLTP: JIT compile overhead is not repaid, and parallel query
# does not help one-row reads while it competes for the two shared vCPUs.
jit = off
max_parallel_workers_per_gather = 0

# ---- Observability -----------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
track_io_timing = on
log_min_duration_statement = '500ms'
log_checkpoints = on
log_lock_waits = on                 # catch contention on the player rows
log_autovacuum_min_duration = 0     # watch vacuum keep pace with the hot table
log_temp_files = 0                  # catch work_mem spilling to disk
log_line_prefix = '%m [%p] %u@%d '

# ---- Locale ------------------------------------------------------------------
timezone = 'UTC'
datestyle = 'iso, mdy'
lc_messages = 'C'
