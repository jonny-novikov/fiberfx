# A separate minimal Fly app for bitmapist-server. Private (no public services):
# only the dashboard and markers on the same org reach it over 6PN. Stateful
# (memory-mapped db on a volume), so it stays always-on rather than scaling to
# zero. Sized small — the hot set at Codemojex scale is a few megabytes.
app = "codemojex-bitmapist"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "bitmapist_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

# No [[services]] block: the app has no public ports. Reached privately at
# codemojex-bitmapist.internal:6400 from apps in the same organization.
[checks.alive]
  type = "tcp"
  port = 6400
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
