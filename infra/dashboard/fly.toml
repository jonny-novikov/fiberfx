# codemojex-dashboard — Gin server fronting pgweb + a Valkey monitor.
#
# Reaches echo-postgres and echo-valkey over the private 6PN; only its own HTTPS
# site is public, behind basic auth. No database port is exposed.
#
#   fly apps create codemojex-dashboard
#   fly secrets set -a codemojex-dashboard \
#     DASH_USER=ops DASH_PASS="$(openssl rand -hex 16)" \
#     PGWEB_DATABASE_URL="postgres://codemojex_ro:$EXT_RO_PW@echo-postgres.internal:5432/codemojex?sslmode=disable" \
#     VALKEY_ADDRESS="echo-valkey.internal:6390"
#   fly deploy -a codemojex-dashboard

app = "codemojex-dashboard"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
