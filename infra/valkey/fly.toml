# Fly deploy config for the EchoMQ Valkey datastore.
# A single private 1 GB shared-cpu-2x machine with a volume for the AOF.
# It is a datastore: no public ports, and it never autostops.

app = "echo-valkey"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

# The AOF lives here. Size it for several times the maxmemory cap (the AOF grows
# between rewrites): 3 GB is comfortable headroom over a 512 MB working set.
[[mounts]]
  source = "valkey_data"
  destination = "/data"

# shared-cpu-2x @ 1 GB, stated explicitly: 2 shared vCPUs, 1024 MB.
[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory = "1024mb"

# No [[services]] block → no public ports. Reachable only over the private
# network at echo-valkey.internal:6390.

# Fly-side health: a TCP accept on the Valkey port (AUTH happens after connect).
[checks]
  [checks.valkey]
    type = "tcp"
    port = 6390
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
