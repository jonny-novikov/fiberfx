# fly.toml app configuration file generated for echo-valkey on 2026-06-25T08:20:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'echo-valkey'
primary_region = 'fra'
kill_signal = 'SIGTERM'
kill_timeout = '10s'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'valkey_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[checks]
  [checks.alive]
    port = 6390
    type = 'tcp'
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 1024
