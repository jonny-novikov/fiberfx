################################# CODEMOJEX / ECHOMQ VALKEY ###################
# Tuned for a Fly shared-cpu-2x machine with 1 GB RAM (2 shared vCPUs).
#
# The shape of the box drives every choice here:
#   * Command execution is single-threaded. The hot path (leaderboard ZSETs,
#     first-mover hashes, the EchoMQ streams, Lua) runs on ONE vCPU; the second
#     vCPU is left free for background work — AOF fsync, the AOF-rewrite fork's
#     copy-on-write, and lazy-free — NOT for io-threads (this workload is
#     command-bound, not network-bound).
#   * maxmemory is held well under the 1 GB cap so a rewrite fork's COW and
#     allocator fragmentation cannot push the box into the kernel OOM killer.
#   * Eviction is OFF: at the cap, writes are refused (a loud error you alert
#     on) rather than silently dropping competitive state.
#
# The password, and any memory/port override, are injected at boot from the
# environment by docker-entrypoint.sh — nothing secret lives in this file.
###############################################################################

# --- network -----------------------------------------------------------------
# Listen on all interfaces; on Fly the machine is reachable only over the
# private 6PN network (no public ports in fly.toml). protected-mode stays ON, so
# a misconfigured deploy with no password fails closed instead of open.
bind 0.0.0.0 ::
protected-mode yes
port 6390
tcp-backlog 511
tcp-keepalive 300
# Long-lived pooled connections from EchoMQ.Connector; the client sends its own
# idle heartbeat, so the server imposes no idle timeout.
timeout 0

# --- general -----------------------------------------------------------------
daemonize no
supervised no
loglevel notice
logfile ""
databases 1
# Hardening: no CONFIG of protected settings, no DEBUG/MODULE over the wire.
enable-protected-configs no
enable-debug-command no
enable-module-command no

# --- memory ------------------------------------------------------------------
# 512 MB of ~1024 MB. The rest is headroom for the AOF-rewrite fork (copy-on-
# write), jemalloc fragmentation, client buffers, and the OS. The live game
# state (per-round ZSET + first-mover hashes + the transient queue backlog +
# the EchoStore L2) is small, so this cap is generous; raise VALKEY_MAXMEMORY
# and the box together if it is ever approached.
maxmemory 512mb
# noeviction: refuse writes at the cap and surface the pressure as an alert;
# never drop a leaderboard entry or a queued job to make room.
maxmemory-policy noeviction
# Bound the memory all clients' output buffers may use, so one slow consumer
# (or a stuck RESP3 tracking subscriber) cannot balloon the box.
maxmemory-clients 64mb

# --- threads -----------------------------------------------------------------
# One I/O thread. io-threads only parallelize socket read/write/parse, which is
# not this workload's bottleneck; keeping it at 1 leaves the second vCPU for the
# background fork/fsync/lazy-free work that actually causes latency spikes here.
# Raise this only after observing network I/O (not command execution) as the
# limit, on a box with more than two cores.
io-threads 1

# Free large keys off the main thread (on the spare vCPU) so a big delete,
# flush, or expiry never stalls command execution.
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes

# --- persistence: AOF is the source of truth ---------------------------------
# AOF with a one-second fsync is the ~1s loss bound EchoMQ's checkpoints are
# designed against. RDB save points are disabled so there is a SINGLE fork
# source — the AOF rewrite, which writes a compact RDB-preamble base — rather
# than two competing for the spare vCPU and the volume's I/O.
appendonly yes
appendfilename "appendonly.aof"
appenddirname "appendonlydir"
appendfsync everysec
# Keep fsync'ing during a rewrite for durability; the spare vCPU absorbs the
# rewrite. Flip to "yes" only if rewrites are observed to cause latency spikes
# (it widens the loss window for the duration of the rewrite).
no-appendfsync-on-rewrite no
aof-use-rdb-preamble yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-timestamp-enabled no
# No periodic RDB snapshot. Use volume snapshots or an on-demand BGSAVE for
# backups; re-enable e.g. "save 3600 1" only if you have COW headroom to spare.
save ""
stop-writes-on-bgsave-error no
dir /data

# --- defragmentation ---------------------------------------------------------
# Rounds open and close and keys expire continuously, so jemalloc fragmentation
# builds over a long uptime. Active defrag reclaims it incrementally; the cycle
# is capped low to stay gentle on the shared vCPU. (Requires the jemalloc build,
# which the Dockerfile produces.)
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25

# --- observability -----------------------------------------------------------
# Catch a slow command (a large ZRANGEBYSCORE, an expensive Lua) and tail
# latency, so a spike on the single command thread is visible.
slowlog-log-slower-than 10000
slowlog-max-len 128
latency-monitor-threshold 100

# --- client output buffers ---------------------------------------------------
# Kill a pub/sub or replica client whose output buffer runs away before it
# threatens the cap. (replica limits are dormant until you add a replica.)
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60
