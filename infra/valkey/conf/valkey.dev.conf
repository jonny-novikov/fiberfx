# echo-valkey · DEV posture — throwaway and tolerant. Data does NOT survive a restart.
# No persistence (no fork pressure), eviction allowed under pressure (it is scratch space).
# Secrets/invariants injected at boot.

io-threads 1
maxmemory 256mb
maxmemory-policy allkeys-lru         # dev tolerates eviction; it is a scratch cache, not of record

appendonly no                        # ephemeral — nothing to persist in dev
save ""

tcp-backlog 512
tcp-keepalive 300
loglevel notice
