################################################################################
# EchoMQ — Valkey 9.x on Fly shared-cpu-2x / 1 GB
#
# This file is the tuning surface. It carries NO password: the password is
# injected at boot through VALKEY_EXTRA_FLAGS (a Fly secret) so it never lands
# in the image or in version control. See the Dockerfile and fly.toml beside it.
#
# Sizing premise: command execution is single-threaded, so the second shared
# vCPU is reserved for background work (AOF fsync, fork copy-on-write, jemalloc
# purge, lazy frees, active defrag) — not for busy-waiting I/O threads, which
# would burn the shared-CPU budget. See the companion article for the full
# reasoning.
################################################################################

# ---- Network -----------------------------------------------------------------
# Bind both wildcards. On Fly the machine has no public IP and no [[services]],
# so the only reachable address is the private 6PN one; binding :: makes the
# server reachable at echo-valkey.internal over the org's WireGuard mesh.
bind 0.0.0.0 ::
protected-mode yes
port 6390
tcp-backlog 511
tcp-keepalive 300
timeout 0

# ---- Single logical database -------------------------------------------------
# Standalone node, one keyspace. Numbered databases are a cluster-mode feature
# in 9.x and are not used here.
databases 1

# ---- Hardening ---------------------------------------------------------------
enable-protected-configs no
enable-debug-command no
enable-module-command no

# ---- Memory: a loud guardrail, not a working ceiling -------------------------
# The live dataset is single-digit megabytes (round leaderboards, presence,
# in-flight stream entries; player balances live in Postgres). 512 MB sits far
# above that, leaving ~half the box for fork copy-on-write during an AOF rewrite,
# client and replication buffers, and jemalloc overhead. noeviction means a
# runaway keyspace REJECTS writes loudly instead of being OOM-killed silently.
# Raise this only after watching used_memory and mem_fragmentation_ratio.
maxmemory 512mb
maxmemory-policy noeviction
maxmemory-clients 64mb

# ---- Lazy freeing: keep deletes off the command thread -----------------------
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes

# ---- Threads -----------------------------------------------------------------
# One I/O thread on a shared-CPU machine. Extra I/O threads busy-wait, which
# pins CPU near 100% and drains the shared burst balance even while idle. The
# background helper threads (fsync, jemalloc bg purge) sleep, so they are the
# right tenants for the second vCPU.
io-threads 1

# jemalloc's background purge thread sleeps between cycles; let it return pages
# to the OS off the main thread.
jemalloc-bg-thread yes

# ---- Persistence: AOF is the single source of durability ---------------------
# One fork source. AOF everysec bounds worst-case loss to about one second and
# fsyncs on a background thread. RDB snapshotting is disabled so it does not
# compete for a second fork; the AOF still uses an RDB preamble for fast rewrite.
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes
aof-timestamp-enabled no
appenddirname "appendonlydir"
save ""
dir /data

# Fail the write rather than acknowledge data that may not survive.
propagation-error-behavior panic

# ---- Active defragmentation (jemalloc only) ----------------------------------
# Relocates live objects out of sparse jemalloc runs so empty pages are purged,
# keeping mem_fragmentation_ratio near 1. Gentle cycle bounds so the main thread
# is never starved.
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25
active-defrag-max-scan-fields 1000

# ---- Client output buffers ---------------------------------------------------
# Pub/Sub fan-out (round events) is bounded so a slow subscriber is dropped
# rather than allowed to grow the server's memory without limit.
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit pubsub 32mb 8mb 60
client-output-buffer-limit replica 256mb 64mb 60

# ---- Observability -----------------------------------------------------------
# On 9.1 watch used_active_time_main_thread (via INFO) for true headroom: with
# I/O threads the raw CPU figure busy-waits near 100% and hides spare capacity.
slowlog-log-slower-than 10000
slowlog-max-len 128
latency-monitor-threshold 100
latency-tracking yes
loglevel notice
logfile ""
crash-log-enabled yes

# ---- Shutdown ----------------------------------------------------------------
# Give the AOF a chance to flush on SIGTERM before the platform forces exit.
shutdown-timeout 10
