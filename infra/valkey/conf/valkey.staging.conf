# echo-valkey · STAGING posture — mirrors prod durability at a fraction of the size,
# sized for fewer than 5000 simultaneous players. Note: 5000 players is NOT 5000 Valkey
# connections — the app multiplexes through a small connector pool, so the binding
# constraints are working-set memory and AOF throughput, both comfortable here.
# Secrets/invariants injected at boot.

io-threads 2
maxmemory 1gb                        # 5000 players' sessions + leaderboard + queue fit well under this
maxmemory-policy noeviction          # same refuse-don't-evict contract as prod, so staging tests it

appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 128mb
aof-use-rdb-preamble yes
save ""

repl-diskless-sync yes
repl-backlog-size 32mb

tcp-backlog 1024
tcp-keepalive 300
loglevel notice
