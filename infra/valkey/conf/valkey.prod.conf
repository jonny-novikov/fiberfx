# echo-valkey · PRODUCTION posture — durability + capacity for the live queue.
# Secrets and invariants (requirepass, bind, port, dir) are injected at boot, never here.
# Override sizing without a rebuild via [env] VALKEY_IO_THREADS / VALKEY_MAXMEMORY.

io-threads 4
maxmemory 6gb
maxmemory-policy noeviction          # a job store surfaces pressure as errors, never silent loss

# durability: append-only log, ~1s loss bound; keep the rewrite fork off the fsync path
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 256mb
aof-use-rdb-preamble yes
save ""                              # AOF is the durability mechanism; no RDB fork on top

# replication (Topology B replicas resync without touching the volume)
repl-diskless-sync yes
repl-backlog-size 64mb

tcp-backlog 4096
tcp-keepalive 300
loglevel notice
