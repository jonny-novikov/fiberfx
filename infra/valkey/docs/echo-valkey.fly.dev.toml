# Fly.io · DEV — echo-valkey-dev. Deploy with:  fly deploy -c fly.dev.toml
# Tiny, ephemeral, scale-to-zero. Data does not survive a stop — fine for a shared dev store.
# (For purely local dev, the docker-compose Valkey already covers it; this is the shared Fly dev app.)
#   fly apps create echo-valkey-dev
#   fly secrets set VALKEY_PASSWORD="$(openssl rand -base64 24)" -a echo-valkey-dev
#   fly deploy -c fly.dev.toml

app = "echo-valkey-dev"
primary_region = "fra"
kill_signal = "SIGTERM"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    VALKEY_VERSION = "9.1"

[env]
  VALKEY_CONFIG = "/usr/local/etc/valkey/valkey.dev.conf"

# No [mounts]: dev is ephemeral. Restart = empty store, which is the point in dev.

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[services]]
  protocol = "tcp"
  internal_port = 6379
  # Scale to zero between uses to save money; the proxy resumes it on the next connection.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  [services.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400
  [[services.tcp_checks]]
    interval = "30s"
    timeout = "4s"
    grace_period = "20s"
