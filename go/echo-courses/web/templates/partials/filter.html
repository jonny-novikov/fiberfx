{{define "filter" -}}
<div class="filter-bar" role="group" aria-label="Filter courses by track">
  <button type="button" class="filter-btn active" data-tag="all" aria-pressed="true">All<span class="cnt">5</span></button>
  <button type="button" class="filter-btn" data-tag="elixir" aria-pressed="false">Elixir<span class="cnt">1</span></button>
  <button type="button" class="filter-btn" data-tag="agents" aria-pressed="false">Agents<span class="cnt">1</span></button>
  <button type="button" class="filter-btn" data-tag="redis" aria-pressed="false">Redis<span class="cnt">1</span></button>
  <button type="button" class="filter-btn" data-tag="echomq" aria-pressed="false">EchoMQ<span class="cnt">1</span></button>
  <button type="button" class="filter-btn" data-tag="bcs" aria-pressed="false">BCS<span class="cnt">1</span></button>
</div>
{{- end}}
