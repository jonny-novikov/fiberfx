# datadog.default.conf - Default configuration for datadog toolkit
# Override in datadog.conf with actual keys for env-less operation
#
# Syntax: nginx-style directives
#   directive value;
#   block {
#       directive value;
#   }

# API credentials
api {
    # Use env: prefix for environment variables (default)
    # Or provide direct values in datadog.conf for env-less operation
    key     env:DD_API_KEY;
    app_key env:DD_APP_KEY;

    # Datadog site (datadoghq.com, datadoghq.eu, us3.datadoghq.com, etc.)
    site    datadoghq.com;
}

# Default settings
defaults {
    env    production;
    output json;
}
