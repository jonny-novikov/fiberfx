title: EchoMQ — BEAM-Native Polyglot Job Queue Backed by Redis
summary: Elixir job queue and scheduler with Redis backend, full wire compatibility with Node.js BullMQ and Go EchoMQ workers. v1.3.0, 20 modules, OTP-native with GenServer/Supervisor architecture. Supports priorities, retries, rate limiting, parent-child flows, cron scheduling, and distributed tracing.
info: Jobs are persisted in Redis using Lua scripts for atomic state transitions. The Elixir implementation shares Redis data structures and Lua scripts with the Node.js and Go implementations (the EchoMQ polyglot protocol), enabling cross-language job processing.
