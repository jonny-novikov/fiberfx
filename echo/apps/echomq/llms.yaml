version: "1.0"
roles:
    director:
        focus: Coordinate changes across the Phoenix umbrella app
        scope:
            - phoenix/lib/*/
        restrictions:
            - do not modify other umbrella apps
        tools:
            - llms_parse
            - llms_component
            - tsk_create
        patterns:
            - verify OTP supervision trees
            - check cross-app dependencies
    evaluator:
        focus: Review Elixir code quality and OTP patterns
        scope:
            - all modules in the assigned app
        restrictions:
            - do not modify code directly
        tools:
            - llms_parse
            - llms_expand
        patterns:
            - verify module paths
            - check supervision strategy
            - validate typespec coverage
    implementor:
        focus: Write Elixir modules following app conventions
        scope:
            - assigned app lib/ directory
        tools:
            - llms_parse
            - llms_format
        patterns:
            - GenServer patterns
            - OTP supervision
            - Phoenix context boundaries
agent:
    model: claude-opus-4-7
    capabilities:
        - code
        - review
        - elixir
        - otp
    tags:
        - phoenix
        - elixir
        - otp
        - phoenix_app
constraints:
    must_do:
        - verify module paths match lib/ structure
        - run mix compile
    must_not:
        - modify other umbrella apps
    requires:
        - Phoenix umbrella project
