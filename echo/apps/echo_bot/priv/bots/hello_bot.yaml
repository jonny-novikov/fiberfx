# The one bot's definition — YAML v1.0 (F10.1-INV5).
#
# A bot exists because this file declares it; the loader (EchoBot.Config) reads `version`
# first, validates it is "1.0", then reads the five-key definition. The token is NEVER written
# here — only the NAME of the environment variable it lives in (`token_env`); the loader resolves
# that env var at boot (F10.1-R8). The `handler` names the module that routes the bot's commands.
version: "1.0"
name: hello_bot
platform: telegram
token_env: ECHO_BOT_HELLO_TOKEN
handler: EchoBot.Handlers.Hello
