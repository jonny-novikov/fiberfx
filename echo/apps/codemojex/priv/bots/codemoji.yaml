# The Codemoji bot definition — echo_bot YAML v1.0.
#
# echo_bot's config loader reads `version` first, validates it is "1.0", then reads the
# five-key definition. The token is NEVER written here — only the NAME of the environment
# variable it lives in (`token_env`); the loader resolves that env var at boot. `handler`
# names the module echo_bot routes this bot's commands to.
#
# To run the live inbound engine, point echo_bot at this file and enable an updater:
#
#   config :echo_bot,
#     updater: :polling,
#     bot_config: Path.join(:code.priv_dir(:codemojex), "bots/codemoji.yaml")
#
# With no such config echo_bot boots its engine idle (updater :none) and only the outbound
# send path is used — see docs/codemojex/notifications.
version: "1.0"
name: codemoji
platform: telegram
token_env: CODEMOJI_BOT_TOKEN
handler: Codemojex.Bot.Handler
