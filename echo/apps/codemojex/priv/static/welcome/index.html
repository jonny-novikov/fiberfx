<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Codemoji</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/welcome/welcome.css"/>
</head>
<body>
  <!--
    Tier 1 - the welcome shell. Ships no framework runtime. Served by the codemojex
    app: the HTML at / (PageController) and its assets via Plug.Static (static_paths
    includes `welcome` and `assets`). Everything here is SAME-ORIGIN with /lobby -
    which the tg_init cookie below requires. The only job is to hand the Telegram
    initData to the lobby: the apex page links into the LiveView at /lobby.
  -->
  <main class="splash">
    <img src="/assets/cm-logo-md.png" alt="Codemoji" width="160"/>
    <a class="enter" href="/lobby">Играть</a>
  </main>
  <script>
    // Forward Telegram initData to the lobby once, as a short-lived cookie the
    // LiveView mount reads; the SES handshake itself stays server-side.
    try {
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg && tg.initData) document.cookie = "tg_init=" + encodeURIComponent(tg.initData) + ";path=/;max-age=120;samesite=lax";
      tg && tg.expand && tg.expand();
    } catch (_e) {}
  </script>
</body>
</html>
