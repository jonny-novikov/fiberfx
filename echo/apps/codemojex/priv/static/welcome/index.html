<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Codemoji</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://static.codemoji.games/welcome/welcome.css"/>
</head>
<body>
  <!--
    Tier 1 - static HTML. Ships no framework runtime. This file and its CSS/sprites
    are served from static.codemoji.games (Tigris public bucket), NOT from the
    codemojex machine. First paint is one cached GET. The only job is to hand the
    Telegram initData to the lobby: the apex page links into the LiveView at /lobby.
  -->
  <main class="splash">
    <img src="https://static.codemoji.games/welcome/cm-logo.svg" alt="Codemoji" width="160" height="160"/>
    <a class="enter" href="/lobby">Играть</a>
  </main>
  <script>
    // Forward Telegram initData to the lobby once, as a short-lived cookie the
    // LiveView mount reads; the SES handshake itself stays server-side.
    try {
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg && tg.initData) document.cookie = "tg_init=" + encodeURIComponent(tg.initData) + ";path=/;max-age=120;samesite=lax";
      tg && tg.expand && tg.expand();
    } catch (_e) {}
  </script>
</body>
</html>
