<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="tokens.css" />
  <style>
    html, body { margin: 0; height: 100%; }
    #root, .dc-root { height: 100%; }
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-thumb { background: rgb(var(--slate-7)); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
    *::-webkit-scrollbar-track { background: transparent; }
  </style>
</helmet>

<div style="height:100vh; display:flex; flex-direction:column; background:rgb(var(--bg-primary)); font-family:var(--font-primary);">
  <header style="display:flex; align-items:center; gap:14px; height:50px; flex-shrink:0; padding:0 18px; border-bottom:1px solid rgb(var(--border-secondary)); background:rgb(var(--bg-secondary));">
    <span style="display:inline-flex; color:rgb(var(--iris-9));">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M13 2L4 14h6l-1 8 9-12h-6z"></path></svg>
    </span>
    <span style="font:700 14px/1 var(--font-primary); letter-spacing:-0.01em; color:rgb(var(--fg-primary));">EchoMQ</span>
    <span style="width:1px; height:18px; background:rgb(var(--border-primary));"></span>
    <span style="font:600 11px/1 var(--font-secondary); letter-spacing:0.12em; text-transform:uppercase; color:rgb(var(--fg-tertiary));">Design System</span>

    <div style="margin-left:auto; display:flex; align-items:center; gap:10px;">
      <a href="EchoMQ.dc.html" style="display:inline-flex; align-items:center; height:32px; padding:0 12px; border-radius:8px; font:600 12.5px/1 var(--font-primary); color:rgb(var(--fg-secondary)); text-decoration:none; border:1px solid rgb(var(--border-primary));">Open dashboard →</a>
      <button onClick="{{ toggleTheme }}" title="{{ themeTitle }}" style="display:inline-flex; align-items:center; gap:8px; height:32px; padding:0 13px; border:1px solid rgb(var(--border-primary)); border-radius:8px; background:transparent; color:rgb(var(--fg-secondary)); cursor:pointer; font:600 12.5px/1 var(--font-primary);">
        <span style="width:13px; height:13px; border-radius:50%; border:1.5px solid currentColor; background:linear-gradient(90deg, currentColor 0 50%, transparent 50% 100%);"></span>
        {{ themeLabel }}
      </button>
    </div>
  </header>

  <div ref="{{ setMount }}" style="flex:1; min-height:0; overflow:hidden; position:relative;"></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900},&quot;startTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = {
    theme: (typeof localStorage !== "undefined" && localStorage.getItem("mc-theme")) || (this.props.startTheme ?? "dark"),
  };

  mountEl = null;
  instance = null;
  rt = null;
  _busy = false;

  setMount = (el) => {
    this.mountEl = el;
    if (el) this.mountView();
  };

  // Semantic tokens are substituted at :root, so the theme class must sit on <html>.
  applyTheme() {
    const el = document.documentElement;
    el.classList.remove("dark-theme", "light-theme");
    el.classList.add(this.state.theme === "dark" ? "dark-theme" : "light-theme");
    // Chrome can fail to invalidate descendant colors that read theme tokens
    // through rgb(var(--token)) when only a class on <html> changes. Force a
    // one-frame subtree style recalc so every token-driven color repaints.
    const m = this.mountEl;
    if (m) { m.style.display = "none"; void m.offsetWidth; m.style.display = ""; }
  }

  componentDidMount() {
    this.applyTheme();
  }

  async mountView() {
    if (!this.mountEl || this._busy || this.instance) return;
    this._busy = true;
    try {
      this.rt ??= await import("./mercury-runtime.js");
      this.instance = await this.rt.mountComponent("./Catalogue.svelte", this.mountEl, {
        theme: this.state.theme,
      });
    } catch (e) {
      console.error("[Catalogue] mount failed", e);
      if (this.mountEl) {
        this.mountEl.innerHTML =
          '<div style="padding:40px;font-family:var(--font-secondary);color:rgb(var(--fg-negative));white-space:pre-wrap;">' +
          String((e && e.stack) || e) + "</div>";
      }
    } finally {
      this._busy = false;
    }
  }

  toggleTheme = () => {
    const theme = this.state.theme === "dark" ? "light" : "dark";
    try { localStorage.setItem("mc-theme", theme); } catch (_) {}
    this.setState({ theme });
  };

  componentDidUpdate() {
    this.applyTheme();
  }

  renderVals() {
    return {
      setMount: this.setMount,
      toggleTheme: this.toggleTheme,
      themeLabel: this.state.theme === "dark" ? "Dark" : "Light",
      themeTitle: this.state.theme === "dark" ? "Switch to light theme" : "Switch to dark theme",
    };
  }
}
</script>
</body>
</html>
