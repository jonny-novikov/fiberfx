[package]
name = "echo-fx"
version = "0.0.1"
edition = "2021"
description = "Rust-backed compute primitives for Mercury (echo/fx): the BrandedId codec + Snowflake minter, with the fusion/work-stealing scheduler layered in TypeScript over Node Cluster."
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"

# wasm-opt (binaryen) is an optional post-pass; disabled here so the build does
# not depend on fetching a binaryen release. Re-enable in CI where it is cached.
[package.metadata.wasm-pack.profile.release]
wasm-opt = false
