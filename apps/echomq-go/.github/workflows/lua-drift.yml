name: Lua Drift Check

on:
  push:
    paths:
      - 'pkg/echomq/scripts/scripts.go'
      - 'scripts/check-lua-drift.sh'
      - 'scripts/lua-pins.txt'
      - 'Makefile'
      - '.github/workflows/lua-drift.yml'
  pull_request:
    paths:
      - 'pkg/echomq/scripts/scripts.go'
      - 'scripts/check-lua-drift.sh'
      - 'scripts/lua-pins.txt'
      - 'Makefile'
      - '.github/workflows/lua-drift.yml'

jobs:
  check-lua-drift:
    name: Verify BullMQ pin integrity
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Lua drift check
        run: make check-lua-drift
        working-directory: .

      - name: Report drift detail on failure
        if: failure()
        run: |
          echo "::error title=Lua drift detected::Embedded BullMQ Lua scripts have drifted from the pinned commit 6a31e0aeab1311d7d089811ede7e11a98b6dd408 (BullMQ v5.62.0). Review the check-lua-drift output above and follow the re-pinning ceremony in scripts/check-lua-drift.sh header if the drift is intentional."
