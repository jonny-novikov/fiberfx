# flyer.default.conf - Default configuration for flyer CLI
# This file contains sensible defaults. Override in flyer.conf.
#
# Syntax: nginx-style directives
#   directive value;
#   block {
#       directive value;
#   }

# Database configuration
database {
    path /app/data/packages.db;
}

# S3/Tigris configuration
s3 {
    endpoint https://fly.storage.tigris.dev;
    bucket   fwhd-packages;
    region   auto;

    # Credentials from environment (recommended)
    access_key env:AWS_ACCESS_KEY_ID;
    secret_key env:AWS_SECRET_ACCESS_KEY;
}

# Litestream replication
litestream {
    config_path    /app/litestream.yml;
    retention_days 7;
    s3_path        db/packages;
    sync_interval  10s;
    snapshot_interval 1h;
    retention      72h;
    retention_check_interval 1h;
    validation_interval 1h;
}

# Package storage
packages {
    dir         /app/packages;
    entry_point dist/index.js;
}

# Sync settings
sync {
    component backend;
    timeout   60;
}

# PostgreSQL configuration (for pg commands)
postgres {
    host       localhost;
    port       25432;
    database   codemoji_game;
    user       fireheadz_studio;
    password   env:PG_PASS;
    export_dir /tmp/codemoji-migration;
    # sql_dir auto-detected from workspace
}
